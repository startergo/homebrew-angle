name: Build Bottles

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: "0 0 * * 0"
  push:
    branches: [master]
    paths:
      - 'Formula/**'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g., 1.0.0 or 2025.12.27)'
        required: false
        default: ''
      release:
        description: 'Create GitHub release?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      angle_commit: ${{ steps.angle_commit.outputs.commit }}
      create_release: ${{ steps.version.outputs.create_release }}
    steps:
      - id: angle_commit
        run: |
          # Get latest ANGLE commit hash (full 40 chars for git fetch)
          COMMIT=$(git ls-remote https://chromium.googlesource.com/angle/angle HEAD | awk '{ print $1 }')
          SHORT_COMMIT=${COMMIT:0:8}
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "ANGLE commit: $SHORT_COMMIT"

      - id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # For scheduled runs or if no version specified, generate date-based version
          if [ -z "$VERSION" ]; then
            VERSION=$(date +%Y.%m.%d)
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

          # Create release for scheduled runs and workflow_dispatch with release=true
          CREATE_RELEASE="${{ github.event.inputs.release }}"
          if [ "$CREATE_RELEASE" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            echo "create_release=true" >> $GITHUB_OUTPUT
          else
            echo "create_release=false" >> $GITHUB_OUTPUT
          fi

  build-bottle:
    needs: determine-version
    runs-on: macos-latest
    env:
      ARCH: arm64
      VERSION: ${{ needs.determine-version.outputs.version }}
      SOURCE_VERSION: 1.0.0
      ANGLE_COMMIT: ${{ needs.determine-version.outputs.angle_commit }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Set up Git
        uses: Homebrew/actions/git-user-config@master
        with:
          username: "startergo"

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Download build scripts
        run: |
          # Download build script and dependencies
          curl -o build.sh https://raw.githubusercontent.com/startergo/build-angle/main/build.sh
          curl -o clean_deps.py https://raw.githubusercontent.com/startergo/build-angle/main/clean_deps.py
          chmod +x build.sh

      - name: Build ANGLE from source
        run: |
          # Build for ARM64
          ./build.sh $ARCH

      - name: Copy built files to Homebrew cache
        run: |
          # Copy pre-built ANGLE to Homebrew cache for formula to find
          HOMEBREW_CACHE=$(brew --cache)
          mkdir -p "$HOMEBREW_CACHE"
          echo "Copying angle-$ARCH to $HOMEBREW_CACHE/"
          cp -R "angle-$ARCH" "$HOMEBREW_CACHE/"

      - name: Generate formula with pre-built file approach
        run: |
          # Generate formula that copies pre-built files to buildpath
          # This matches the successful local approach
          cat > Formula/angle.rb <<RUBY
          class Angle < Formula
            desc "Almost Native Graphics Layer Engine (OpenGL ES implementation for macOS)"
            homepage "https://chromium.googlesource.com/angle/angle"
            version "$VERSION"
            url "https://github.com/startergo/build-angle/archive/refs/tags/v$SOURCE_VERSION.tar.gz"
            sha256 "9facfb7c61650dd4f534519b2f7fd09c98e6eaae4d5aae3ed74604c0aaa6733c"
            license "BSD-2-Clause"

            bottle do
              root_url "https://github.com/startergo/homebrew-angle/releases/download/v$VERSION"
            end

            def install
              arch = Hardware::CPU.arm? ? "arm64" : "x64"

              # In CI, pre-built files are in the cache directory
              angle_dir = "#{HOMEBREW_CACHE}/angle-#{arch}"

              # Copy to buildpath (where we have write permissions)
              cp_r "#{angle_dir}/lib", buildpath
              cp_r "#{angle_dir}/include", buildpath

              # Now install from buildpath
              lib.install Dir["#{buildpath}/lib/*.dylib"]
              include.install Dir["#{buildpath}/include/*"]
              (lib/"pkgconfig").install Dir["#{buildpath}/lib/pkgconfig/*.pc"]

              inreplace Dir[lib/"pkgconfig/*.pc"] do |s|
                s.gsub!(/^prefix=.*$/, "prefix=#{HOMEBREW_PREFIX}")
              end
            end

            test do
              system "pkg-config", "--exists", "egl"
              system "pkg-config", "--exists", "glesv2"
            end
          end
          RUBY

      - name: Create bottle
        run: |
          # Manually set up tap directory structure
          TAP_DIR="$(brew --repository)/Library/Taps/startergo/homebrew-angle"
          mkdir -p "$TAP_DIR/Formula"
          cp Formula/angle.rb "$TAP_DIR/Formula/" || true  # Skip if identical (CI case)

          # Initialize tap as git repo if needed (required by Homebrew)
          if [ ! -d "$TAP_DIR/.git" ]; then
            cd "$TAP_DIR"
            git init
            git checkout -b master
            echo "# homebrew-angle tap" > README.md
            git add README.md
            git commit -m "Initial commit"
            cd -
          fi

          # Skip brew install to avoid formula search issues
          # Instead manually install to Cellar for brew bottle to find
          HOMEBREW_PREFIX=$(brew --prefix)
          HOMEBREW_CELLAR="$HOMEBREW_PREFIX/Cellar/angle"

          # Create Cellar structure matching brew install layout
          mkdir -p "$HOMEBREW_CELLAR/$VERSION/lib"
          mkdir -p "$HOMEBREW_CELLAR/$VERSION/include"
          mkdir -p "$HOMEBREW_CELLAR/$VERSION/lib/pkgconfig"

          # Copy files to Cellar
          cp angle-$ARCH/lib/*.dylib "$HOMEBREW_CELLAR/$VERSION/lib/"
          cp -R angle-$ARCH/include/* "$HOMEBREW_CELLAR/$VERSION/include/"
          cp angle-$ARCH/lib/pkgconfig/*.pc "$HOMEBREW_CELLAR/$VERSION/lib/pkgconfig/"

          # Fix pkgconfig prefix
          for pc in "$HOMEBREW_CELLAR/$VERSION/lib/pkgconfig/"*.pc; do
            if [ -f "$pc" ]; then
              perl -pi -e "s|^prefix=.*|prefix=$HOMEBREW_PREFIX|" "$pc"
            fi
          done

          # Create .brew/angle directory with formula info for bottle to find
          mkdir -p "$HOMEBREW_CELLAR/$VERSION/.brew/angle"
          echo "$VERSION" > "$HOMEBREW_CELLAR/$VERSION/.brew/angle/INSTALL_RECEIPT.json"

          echo "Formula installed to $HOMEBREW_CELLAR/$VERSION"

          # Create bottle from tap formula (formula now exists in Cellar)
          export HOMEBREW_NO_INSTALL_FROM_API=1
          brew bottle --json --force-core-tap "$TAP_DIR/Formula/angle.rb" \
            --root-url=https://github.com/startergo/homebrew-angle/releases/download/v$VERSION

          # Merge JSON into formula and write .rb migration file
          brew bottle --merge --write --force-core-tap *.json

          # Show created files
          echo "=== Created bottle files ==="
          ls -la *.rb *.json 2>/dev/null || echo "No files in current dir"

      - name: Upload bottle tarball
        uses: actions/upload-artifact@v4
        with:
          name: bottle-arm64
          path: "*.tar.gz"
          if-no-files-found: ignore

      - name: Upload bottle JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-arm64
          path: "*.json"
          if-no-files-found: ignore

  publish-bottles:
    needs: [determine-version, build-bottle]
    runs-on: ubuntu-latest
    if: needs.determine-version.outputs.create_release == 'true'
    env:
      VERSION: ${{ needs.determine-version.outputs.version }}
      ANGLE_COMMIT: ${{ needs.determine-version.outputs.angle_commit }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-*
          merge-multiple: true

      - name: Process bottles
        run: |
          # Show what we got
          ls -la *.tar.gz *.json 2>/dev/null || true

          # Merge bottles into formula
          if ls *.json 2>/dev/null; then
            for json in *.json; do
              echo "=== $json ==="
              cat "$json"
            done

            # Use brew bottle --merge to update formula with bottle sha256
            brew bottle --merge --write *.json

            # Show the updated formula
            echo "=== Updated Formula/angle.rb ==="
            cat Formula/angle.rb || true
          fi

      - name: Commit bottles to formula
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # Commit the updated formula with bottle blocks
          git add Formula/angle.rb || git add Formula/ || true
          git commit -m "Update bottles for v$VERSION (ANGLE $ANGLE_COMMIT)" || echo "No changes to commit"
          git push origin master || true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create or update release with ANGLE commit info
          gh release create "v$VERSION" \
            --title "ANGLE v$VERSION" \
            --notes "Built from ANGLE commit: $ANGLE_COMMIT

          ### Bottles
          $(ls *.tar.gz 2>/dev/null | sed 's/^/- /' || echo '')" \
            --latest || true

          # Upload bottle tarballs
          for tarball in *.tar.gz; do
            if [ -f "$tarball" ]; then
              echo "Uploading $tarball"
              gh release upload "v$VERSION" "$tarball" || true
            fi
          done
