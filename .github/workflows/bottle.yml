name: Build Bottles

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: "0 0 * * 0"
  push:
    branches: [master]
    paths:
      - 'Formula/**'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g., 1.0.0 or 2025.12.27)'
        required: false
        default: ''
      release:
        description: 'Create GitHub release?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      angle_commit: ${{ steps.angle_commit.outputs.commit }}
      create_release: ${{ steps.version.outputs.create_release }}
    steps:
      - id: angle_commit
        run: |
          # Get latest ANGLE commit hash (full 40 chars for git fetch)
          COMMIT=$(git ls-remote https://chromium.googlesource.com/angle/angle HEAD | awk '{ print $1 }')
          SHORT_COMMIT=${COMMIT:0:8}
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "ANGLE commit: $SHORT_COMMIT"

      - id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # For scheduled runs or if no version specified, generate date-based version
          if [ -z "$VERSION" ]; then
            VERSION=$(date +%Y.%m.%d)
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

          # Create release for scheduled runs and workflow_dispatch with release=true
          CREATE_RELEASE="${{ github.event.inputs.release }}"
          if [ "$CREATE_RELEASE" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            echo "create_release=true" >> $GITHUB_OUTPUT
          else
            echo "create_release=false" >> $GITHUB_OUTPUT
          fi

  build-bottle:
    needs: determine-version
    runs-on: macos-latest
    env:
      ARCH: arm64
      VERSION: ${{ needs.determine-version.outputs.version }}
      BUILD_DATE: ${{ needs.determine-version.outputs.version }}
      SOURCE_VERSION: 1.0.0
      ANGLE_COMMIT: ${{ needs.determine-version.outputs.angle_commit }}
      GITHUB_WORKFLOW: "1"
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Set up Git
        uses: Homebrew/actions/git-user-config@master
        with:
          username: "startergo"

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Create version tag
        run: |
          # Create and push tag BEFORE updating formula (so tarball exists)
          git tag -f "v$VERSION" HEAD
          git push -f origin "v$VERSION"
          echo "Created tag: v$VERSION"

      - name: Calculate new tarball checksum
        run: |
          # Download the new tarball and calculate SHA256
          curl -Ls "https://github.com/startergo/homebrew-angle/archive/refs/tags/v$VERSION.tar.gz" -o angle.tar.gz
          NEW_SHA256=$(shasum -a 256 angle.tar.gz | awk '{ print $1 }')
          echo "NEW_SHA256=$NEW_SHA256" >> $GITHUB_ENV
          echo "New SHA256: $NEW_SHA256"

      - name: Update formula version
        run: |
          # Remove old bottle block
          perl -i -0777 -pe 's/\n  bottle do.*?end\n//gs' Formula/angle.rb

          # Update version, url, and sha256
          sed -i.bak 's/version "[^"]*"/version "$VERSION"/' Formula/angle.rb
          sed -i.bak 's|url "https://github.com/startergo/homebrew-angle/archive/refs/tags/[^"]*\.tar\.gz"|url "https://github.com/startergo/homebrew-angle/archive/refs/tags/v'$VERSION'.tar.gz"|' Formula/angle.rb
          sed -i.bak "s/sha256 \"[^\"]*\"/sha256 \"$NEW_SHA256\"/" Formula/angle.rb

          # Add bottle block using awk
          awk '/license/ { print; print ""; print "  bottle do"; print "    root_url \"https://github.com/startergo/homebrew-angle/releases/download/v'$VERSION'\""; print "  end"; next } { print }' Formula/angle.rb > Formula/angle.rb.tmp
          mv Formula/angle.rb.tmp Formula/angle.rb

          rm -f Formula/angle.rb.bak

          # Commit and push the updated formula
          git add Formula/angle.rb
          git commit -m "Update version to $VERSION"
          git push origin master

      - name: Build bottle
        run: |
          # Set up tap directory
          TAP_DIR="$(brew --repository)/Library/Taps/startergo/homebrew-angle"
          mkdir -p "$TAP_DIR/Formula"

          # Copy the formula to the tap
          cp Formula/angle.rb "$TAP_DIR/Formula/" || true

          # Ensure no Casks directory exists
          rm -rf "$TAP_DIR/Casks"

          # Initialize tap as git repo if needed
          if [ ! -d "$TAP_DIR/.git" ]; then
            cd "$TAP_DIR"
            git init
            git checkout -b master
            echo "# homebrew-angle tap" > README.md
            git add README.md Formula/angle.rb
            git commit -m "Add angle formula"
            cd -
          fi

          # Set env for local taps and uninstall any existing
          export HOMEBREW_NO_INSTALL_FROM_API=1
          brew uninstall angle --force 2>/dev/null || true

          # Install gn from source (no bottle available)
          brew install startergo/gn/gn --build-from-source || true

          # Unlink conflicting packages
          brew unlink vulkan-headers 2>/dev/null || true

          # Install from source with --build-bottle (required for bottle creation)
          brew install --build-bottle startergo/angle/angle || true
          brew link --overwrite angle || true
          # Restore vulkan-headers for other workflows
          brew link vulkan-headers 2>/dev/null || true

          # Create bottle
          brew bottle --json --force-core-tap "$TAP_DIR/Formula/angle.rb" \
            --root-url=https://github.com/startergo/homebrew-angle/releases/download/v$VERSION

          # Copy tarball to tap dir before merge (merge deletes it)
          cp -v *.tar.gz "$TAP_DIR/" 2>/dev/null || true

          # Merge JSON into formula
          brew bottle --merge --write --force-core-tap *.json

          echo "=== Created bottle files ==="
          ls -la "$TAP_DIR"/*.tar.gz 2>/dev/null || echo "No tarball in tap dir"
          ls -la *.json 2>/dev/null || echo "No json in current dir"

      - name: Upload source tarball
        run: |
          # Copy source tarball from tap directory
          TAP_DIR="$(brew --repository)/Library/Taps/startergo/homebrew-angle"
          if [ -f "$TAP_DIR/angle-${VERSION}.tar.gz" ]; then
            cp "$TAP_DIR/angle-${VERSION}.tar.gz" .
            echo "Found source tarball: angle-${VERSION}.tar.gz"
            shasum -a 256 "angle-${VERSION}.tar.gz"
          else
            echo "Warning: Source tarball not found at $TAP_DIR/angle-${VERSION}.tar.gz"
            ls -la "$TAP_DIR"/angle*.* 2>/dev/null || echo "No angle files found"
          fi

      - name: Copy bottle tarball from tap
        run: |
          # Copy tarball from tap dir to workspace for upload
          TAP_DIR="$(brew --repository)/Library/Taps/startergo/homebrew-angle"
          cp "$TAP_DIR"/*.tar.gz . 2>/dev/null || echo "No tarball found"

      - name: Upload bottle tarball
        uses: actions/upload-artifact@v4
        with:
          name: bottle-arm64
          path: "*.tar.gz"
          if-no-files-found: ignore

      - name: Upload bottle JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-arm64-json
          path: "*.json"
          if-no-files-found: ignore

  publish-bottles:
    needs: [determine-version, build-bottle]
    runs-on: ubuntu-latest
    if: needs.determine-version.outputs.create_release == 'true'
    env:
      VERSION: ${{ needs.determine-version.outputs.version }}
      ANGLE_COMMIT: ${{ needs.determine-version.outputs.angle_commit }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-*
          merge-multiple: true

      - name: Process bottles
        run: |
          # Show what we got
          ls -la *.tar.gz *.json 2>/dev/null || true

          # Merge bottles into formula
          if ls *.json 2>/dev/null; then
            for json in *.json; do
              echo "=== $json ==="
              cat "$json"
            done

            # Use brew bottle --merge to update formula with bottle sha256
            brew bottle --merge --write *.json

            # Show the updated formula
            echo "=== Updated Formula/angle.rb ==="
            cat Formula/angle.rb || true
          fi

      - name: Commit bottles to formula
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # Commit the updated formula with bottle blocks
          git add Formula/angle.rb || git add Formula/ || true
          git commit -m "Update bottles for v$VERSION (ANGLE $ANGLE_COMMIT)" || echo "No changes to commit"
          git push origin master || true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create or update release with ANGLE commit info
          gh release create "v$VERSION" \
            --title "ANGLE v$VERSION" \
            --notes "Built from ANGLE commit: $ANGLE_COMMIT

          ### Bottles
          $(ls *.tar.gz 2>/dev/null | sed 's/^/- /' || echo '')" \
            --latest || true

          # Upload bottle tarballs
          for tarball in *.tar.gz; do
            if [ -f "$tarball" ]; then
              echo "Uploading $tarball"
              gh release upload "v$VERSION" "$tarball" || true
            fi
          done
